<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MintCore & CashMint Studio – Flipstarter</title>

  <style>
    :root {
      --mint-green: #2ecc71;
      --mint-green-dark: #27ae60;
      --text-dark: #1e1e1e;
      --text-light: #555;
      --bg-light: #f7fdf9;
      --card-bg: #ffffff;
      --border: #e5e5e5;
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .logo {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 1.9rem;
      font-weight: 600;
    }

    .goal {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      color: var(--text-light);
    }

    .section {
      margin-top: 2rem;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #dfeee6;
      border-radius: 8px;
      overflow: hidden;
      margin: 0.5rem 0 1rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--mint-green);
      width: 0%;
      transition: width 0.4s ease;
    }

    button {
      background: var(--mint-green);
      color: white;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
    }

    button:hover {
      background: var(--mint-green-dark);
    }

    .milestone {
      margin-bottom: 1rem;
      padding: 1rem;
      background: var(--card-bg);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .milestone strong {
      color: var(--mint-green-dark);
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <img src="assets/copilot_image_1772475436039.jpeg" alt="CashMint Studio Header" class="header-image" />
      <h1 id="title">Loading campaign…</h1>
    </div>

    <div id="description" class="goal"></div>

    <div class="section">
      <strong>Goal:</strong>
      <span id="goal"></span> BCH

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>

      <div id="progress-text"></div>

      <button id="pledge-button">Pledge with Bitcoin Cash</button>
    </div>

    <div class="section">
      <h2>Milestones</h2>
      <div id="milestones"></div>
    </div>
  </div>

  <script>
    async function loadCampaign() {
      const response = await fetch("campaign.json");
      const data = await response.json();

      document.getElementById("title").textContent = data.title;
      document.getElementById("description").textContent = data.description;
      document.getElementById("goal").textContent = data.goal.amount;

      const pledged = 0; // Copilot will wire this to real Flipstarter JS
      const goal = data.goal.amount;
      const percent = (pledged / goal) * 100;

      document.getElementById("progress-fill").style.width = percent + "%";
      document.getElementById("progress-text").textContent =
        pledged + " / " + goal + " BCH pledged";

      const milestoneContainer = document.getElementById("milestones");
      data.milestones.forEach(m => {
        const div = document.createElement("div");
        div.className = "milestone";
        div.innerHTML = `
          <strong>${m.name}</strong><br>
          ${m.description}<br>
          <em>${m.amount} BCH</em>
        `;
        milestoneContainer.appendChild(div);
      });

      document.getElementById("pledge-button").onclick = () => {
        alert("Flipstarter pledge flow will be wired here.");
      };
    }

    loadCampaign();
  </script>
</body>
</html>
