<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MintCore & CashMint Studio – Flipstarter</title>

  <!-- Flipstarter CSS (you can replace with your own styling later) -->
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #fafafa;
      color: #222;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 0.5rem;
    }
    .goal {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      color: #444;
    }
    .section {
      margin-top: 2rem;
    }
    .progress-bar {
      width: 100%;
      height: 14px;
      background: #ddd;
      border-radius: 8px;
      overflow: hidden;
      margin: 0.5rem 0 1rem;
    }
    .progress-fill {
      height: 100%;
      background: #4caf50;
      width: 0%;
      transition: width 0.4s ease;
    }
    button {
      background: #0b8fda;
      color: white;
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #0a7ec0;
    }
    .milestone {
      margin-bottom: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 id="title">Loading campaign…</h1>
    <div id="description" class="goal"></div>

    <div class="section">
      <strong>Goal:</strong>
      <span id="goal"></span> BCH

      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>

      <div id="progress-text"></div>

      <button id="pledge-button">Pledge with Bitcoin Cash</button>
    </div>

    <div class="section">
      <h2>Milestones</h2>
      <div id="milestones"></div>
    </div>
  </div>

  <!-- Flipstarter loader -->
  <script>
    async function loadCampaign() {
      const response = await fetch("campaign.json");
      const data = await response.json();

      document.getElementById("title").textContent = data.title;
      document.getElementById("description").textContent = data.description;
      document.getElementById("goal").textContent = data.goal.amount;

      // Placeholder progress (Copilot can wire this to real Flipstarter JS)
      const pledged = 0;
      const goal = data.goal.amount;
      const percent = (pledged / goal) * 100;

      document.getElementById("progress-fill").style.width = percent + "%";
      document.getElementById("progress-text").textContent =
        pledged + " / " + goal + " BCH pledged";

      // Render milestones
      const milestoneContainer = document.getElementById("milestones");
      data.milestones.forEach(m => {
        const div = document.createElement("div");
        div.className = "milestone";
        div.innerHTML = `
          <strong>${m.name}</strong><br>
          ${m.description}<br>
          <em>${m.amount} BCH</em>
        `;
        milestoneContainer.appendChild(div);
      });

      // Placeholder pledge button
      document.getElementById("pledge-button").onclick = () => {
        alert("Flipstarter pledge flow will be wired here.");
      };
    }

    loadCampaign();
  </script>
</body>
</html>
